name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Generate dev icons
        run: npm run icons:dev

      - name: Check desktop feature compiles
        if: matrix.os == 'macos-latest'
        run: cargo check --manifest-path src-tauri/Cargo.toml --features desktop

      - name: Run public CI gate
        run: npm run ci:public

      - name: Run integration smoke (no package build)
        run: npm run test:smoke
